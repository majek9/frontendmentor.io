<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">

    <title>Frontend Mentor | NFT preview card component</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <style>
        .attribution {
            font-size: 11px;
            text-align: center;
        }

        .attribution a {
            color: hsl(228, 45%, 44%);
        }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
<section class="card">
    <div class="card-img-container">
        <img class="card-img-container__logo" src="images/image-equilibrium.jpg" alt="equilibrium logo">
        <div class="card-img-container__overlay"></div>
    </div>
    <a href="#"><h1>Equilibrium #3429</h1></a>
    <p class="card__description">Our Equilibrium collection promotes balance and calm.</p>
    <div></div>
    <p class="card__eth">0.041ETH</p>
    <p class="card__time">3 days left</p>
    <hr>
    <div class="card__profile">
        <img src="images/image-avatar.png" alt="User portrait">
        <p>Creation of <a href="#" class="card__profile_name">Jules Wyvern</a></p>
    </div>
</section>
<div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>.
    Coded by <a href="#">Your Name Here</a>.
</div>
</body>
</html>
